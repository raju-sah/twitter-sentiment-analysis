services:
  - type: web
    name: twitter-sentiment-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m nltk.downloader stopwords"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: NLTK_DATA
        value: /opt/render/project/nltk_data
